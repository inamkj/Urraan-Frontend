<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layout</title>

<style>

body{
    margin:0;
}

header, nav, aside, main, footer{
    background:#ddd;
    border:4px solid #eee;
    height:85px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    display:grid;
    grid-template-columns: 1fr 2fr 1fr;
}

main{
    height:300px;
}

aside{
    height:300px;
}

</style>
</head>

<body>

<header>
    Header
</header>

<nav>
    Navigation Menu
</nav>

<section class="container">
    
    <aside>
        Content
    </aside>

    <main>
        Main Content
    </main>

    <aside>
        Content
    </aside>

</section>

<footer>
    Footer
</footer>

</body>
</html>
